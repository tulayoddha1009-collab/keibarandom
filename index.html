<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>当選馬メーカー（天任せver.）</title>

<link rel="manifest" href="manifest.json">
  
<style>
body {
font-family: sans-serif;
padding: 20px;
max-width: 400px;
margin: auto;
}

label {
font-size: 18px;
display: block;
margin-top: 15px;
}

input {
font-size: 18px;
padding: 10px;
width: 100%;
box-sizing: border-box;
margin-top: 5px;
}

h2 {
font-size: 28px;
text-align: center;
margin-top: 25px;
}

button {
font-size: 18px;
padding: 12px;
width: 100%;
margin-top: 15px;
}

#results{
margin-top:20px;
font-size:24px;
}

#results p{
font-family:monospace;
margin:2px;
}

.rank{
display:inline-block;
width:4ch;
text-align:right;
}

.value{
display:inline-block;
width:3ch;
text-align:right;
}

</style>
</head>

<body>

<h2>当選馬メーカー</h2>
<h2>（天任せver.）</h2>
  
<label>
日付
<input type="date" id="date">
</label>

<label>
場所
<input type="text" id="place" placeholder="場所nnR">
</label>

<!-- 最小値は普段使わないので非表示
<label>
最小値
<input type="number" id="min" min="1">
</label>
-->

<label>
エントリー数
<input type="number" id="max" min="1">
</label>

<label>
取消①
<input type="number" id="cancel1" min="1" placeholder="取消がなければ入力不要">
</label>

<label>
取消②
<input type="number" id="cancel2" min="1" placeholder="取消がなければ入力不要">
</label>

<label>
取消③
<input type="number" id="cancel3" min="1" placeholder="取消がなければ入力不要">
</label>

<button onclick="generate()">生成</button>
<button onclick="resetResults()">リセット</button>


　<div id="remain"></div>
　<div id="results"></div>
　<div id="results"></div>


<script>

let numbers = [];
let index = 0;
let initialized = false;

function initialize(min, max, cancelList) {

numbers = [];

for (let i = min; i <= max; i++) {
if (!cancelList.includes(i)) {
numbers.push(i);
}
}

shuffle(numbers);

index = 0;
initialized = true;
}

function shuffle(array) {

for (let i = array.length - 1; i > 0; i--) {

const j = Math.floor(Math.random() * (i + 1));

[array[i], array[j]] = [array[j], array[i]];

}

}

function generate() {

const min = 1;
const max = parseInt(document.getElementById("max").value);

if (isNaN(max) || max < min) {
alert("正しいエントリー数を入力してください");
return;
}

const cancel1 = parseInt(document.getElementById("cancel1").value);
const cancel2 = parseInt(document.getElementById("cancel2").value);
const cancel3 = parseInt(document.getElementById("cancel3").value);

const cancelList = [cancel1, cancel2, cancel3].filter(n => !isNaN(n));

if (!initialized) {
initialize(min, max, cancelList);
}

if (index >= numbers.length) {
alert("すべての馬が出ました");
return;
}

const value = numbers[index];
const rank = index + 1;
index++;

const date = document.getElementById("date").value;
const place = document.getElementById("place").value;

const p = document.createElement("p");

p.innerHTML = `<span class="rank">${rank}着</span> <span class="value">${value}</span>`;
document.getElementById("results").appendChild(p);

document.getElementById("remain").textContent =
`残り：${numbers.length - index}頭`;

}

function resetResults() {

numbers = [];
index = 0;
initialized = false;

document.getElementById("results").innerHTML = "";
document.getElementById("remain").textContent = "";

}

</script>

</body>
</html>
